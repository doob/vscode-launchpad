<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 524" width="860" height="524" font-family="'SF Mono','Fira Code','Cascadia Code',Menlo,Consolas,monospace" role="img" aria-label="Launchpad: multiple Claude sessions in tabs. Launch one and it runs pre-launch hooks, spins up an isolated git worktree, wires up MCP servers, and boots Claude already knowing your databases, APIs and secrets.">
  <style>
    text { font-size: 15px; }
    .l { opacity: 0; }
    .cmd  { fill: #c9d1d9; }
    .blue { fill: #58a6ff; }
    .cyan { fill: #39c5cf; }
    .orange { fill: #f0883e; }
    .purple { fill: #d2a8ff; }
    .green { fill: #3fb950; }
    .dim  { fill: #8b949e; }
    .sel  { fill: #e6edf3; }
    .tab  { font-size: 13px; }

    /* reveals compressed into the first ~40%, then a long hold before the loop resets */
    .l1  { animation: k1  6s infinite; }
    .l2  { animation: k2  6s infinite; }
    .l3  { animation: k3  6s infinite; }
    .l4  { animation: k4  6s infinite; }
    .l5  { animation: k5  6s infinite; }
    .l6  { animation: k6  6s infinite; }
    .l7  { animation: k7  6s infinite; }
    .l8  { animation: k8  6s infinite; }
    .l9  { animation: k9  6s infinite; }
    .l10 { animation: k10 6s infinite; }
    .l11 { animation: k11 6s infinite; }
    .l12 { animation: k12 6s infinite; }
    .l13 { animation: k13 6s infinite; }

    @keyframes k1  { 0%,2%{opacity:0}  4%,97%{opacity:1} 100%{opacity:0} }
    @keyframes k2  { 0%,5%{opacity:0}  7%,97%{opacity:1} 100%{opacity:0} }
    @keyframes k3  { 0%,8%{opacity:0}  10%,97%{opacity:1} 100%{opacity:0} }
    @keyframes k4  { 0%,11%{opacity:0} 13%,97%{opacity:1} 100%{opacity:0} }
    @keyframes k5  { 0%,14%{opacity:0} 16%,97%{opacity:1} 100%{opacity:0} }
    @keyframes k6  { 0%,17%{opacity:0} 19%,97%{opacity:1} 100%{opacity:0} }
    @keyframes k7  { 0%,20%{opacity:0} 22%,97%{opacity:1} 100%{opacity:0} }
    @keyframes k8  { 0%,23%{opacity:0} 25%,97%{opacity:1} 100%{opacity:0} }
    @keyframes k9  { 0%,26%{opacity:0} 28%,97%{opacity:1} 100%{opacity:0} }
    @keyframes k10 { 0%,29%{opacity:0} 31%,97%{opacity:1} 100%{opacity:0} }
    @keyframes k11 { 0%,32%{opacity:0} 34%,97%{opacity:1} 100%{opacity:0} }
    @keyframes k12 { 0%,35%{opacity:0} 37%,97%{opacity:1} 100%{opacity:0} }
    @keyframes k13 { 0%,38%{opacity:0} 40%,97%{opacity:1} 100%{opacity:0} }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }
  </style>

  <!-- window -->
  <rect x="0" y="0" width="860" height="524" rx="14" fill="#0d1117"/>
  <rect x="0" y="0" width="860" height="46" rx="14" fill="#161b22"/>
  <rect x="0" y="32" width="860" height="14" fill="#161b22"/>
  <circle cx="26" cy="23" r="6" fill="#ff5f56"/>
  <circle cx="48" cy="23" r="6" fill="#ffbd2e"/>
  <circle cx="70" cy="23" r="6" fill="#27c93f"/>
  <text x="430" y="28" text-anchor="middle" class="dim tab">Launchpad — Claude Code sessions</text>

  <!-- session tabs (multiple parallel sessions) -->
  <rect x="0" y="46" width="860" height="40" fill="#0d1117"/>
  <!-- active: Local Dev -->
  <rect x="14" y="52" width="232" height="34" rx="7" fill="#1b2230"/>
  <rect x="14" y="52" width="232" height="3" rx="2" fill="#58a6ff"/>
  <text x="30" y="74" class="tab sel">Local Dev</text>
  <text x="120" y="74" class="tab cyan">⎇ local-1</text>
  <!-- inactive: Staging -->
  <text x="266" y="74" class="tab dim">Staging</text>
  <text x="329" y="74" class="tab cyan">⎇ staging-2</text>
  <!-- inactive: Prod -->
  <text x="452" y="74" class="tab dim">Prod</text>
  <text x="502" y="74" class="tab green">PR#87</text>
  <text x="810" y="75" class="dim" font-size="18">+</text>

  <!-- select + launch -->
  <g class="l l1">
    <rect x="26" y="104" width="220" height="26" rx="6" fill="#1f6feb" opacity="0.18"/>
    <text x="40" y="122" class="sel">▸ Local Dev</text>
    <text x="166" y="122" class="blue">⚡ Launch</text>
  </g>

  <!-- pre-launch hook -->
  <text class="l l2" x="28" y="160"><tspan class="blue">$ </tspan><tspan class="cmd">docker compose up -d</tspan><tspan class="green">   ✓ db · redis healthy</tspan></text>

  <!-- isolated worktree -->
  <text class="l l3" x="28" y="192"><tspan class="cyan">⎇ </tspan><tspan class="dim">worktree .claude/worktrees/local-1 · branch launchpad/local-1</tspan></text>

  <!-- launch command -->
  <text class="l l4" x="28" y="224"><tspan class="blue">$ </tspan><tspan class="cmd">claude --mcp-config .launchpad/mcp.json --append-system-prompt …</tspan></text>

  <!-- mcp servers wired up -->
  <text class="l l5" x="28" y="256"><tspan class="green">✓ </tspan><tspan class="dim">MCP connected · postgres · sentry</tspan></text>

  <!-- Claude boots with the env -->
  <text class="l l6 orange" x="28" y="296"># Active Environment: Local Dev</text>

  <text class="l l7 purple" x="28" y="330">## Databases</text>
  <text class="l l8" x="44" y="356"><tspan class="green">● </tspan><tspan class="dim">App DB · postgres · localhost:5432</tspan></text>

  <text class="l l9 purple" x="28" y="390">## API Endpoints</text>
  <text class="l l10" x="44" y="416"><tspan class="green">● </tspan><tspan class="dim">REST API · http://localhost:4000/v2</tspan></text>

  <text class="l l11 purple" x="28" y="450">## Secrets</text>
  <text class="l l12" x="44" y="476"><tspan class="green">✓ </tspan><tspan class="dim">resolved at launch — never written to disk</tspan></text>

  <!-- ready -->
  <g class="l l13">
    <text x="28" y="510"><tspan class="blue">› </tspan><tspan class="cmd">ready.</tspan></text>
    <rect x="92" y="498" width="9" height="16" fill="#58a6ff" style="animation: blink 1s steps(1) infinite"/>
  </g>
</svg>
